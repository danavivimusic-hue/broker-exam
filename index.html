<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבחן תיווך מקרקעין — מועד דמה</title>
<style>
  :root{
    --bg:#0f1419; --card:#1a2230; --card2:#222c3d; --line:#33415c;
    --txt:#e8edf4; --muted:#9aa7bd; --brand:#4f8cff; --brand2:#3a6fd8;
    --ok:#2ecc71; --okbg:#143324; --bad:#ff5d5d; --badbg:#3a1b1f; --gold:#f5c451;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:"Heebo","Assistant","Arial Hebrew",system-ui,Arial,sans-serif;
    line-height:1.6; padding:0 0 80px;
  }
  header{
    background:linear-gradient(135deg,#1c2940,#0f1419);
    border-bottom:1px solid var(--line); padding:54px 20px 24px; text-align:center;
    position:sticky; top:0; z-index:50; backdrop-filter:blur(6px);
  }
  header h1{margin:0 0 6px; font-size:24px; letter-spacing:-.02em}
  header p{margin:0; color:var(--muted); font-size:14px}
  .langbtn{
    position:absolute; top:14px; right:16px; z-index:60;
    background:var(--brand); color:#fff; border:none; border-radius:999px;
    padding:9px 18px; font-size:14px; font-weight:700; cursor:pointer;
    font-family:inherit; box-shadow:0 2px 10px rgba(0,0,0,.35); transition:.15s;
  }
  .langbtn:hover{background:var(--brand2)}
  .tests{display:flex; gap:8px; justify-content:center; margin-top:14px; flex-wrap:wrap}
  .testbtn{
    font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;
    background:var(--card2); color:var(--muted); border:1px solid var(--line);
    border-radius:999px; padding:7px 16px; transition:.15s;
  }
  .testbtn:hover{border-color:var(--brand); color:var(--txt)}
  .testbtn.active{background:var(--brand); color:#fff; border-color:var(--brand)}
  .bar{
    display:flex; gap:16px; justify-content:center; align-items:center;
    margin-top:14px; flex-wrap:wrap;
  }
  .pill{background:var(--card2); border:1px solid var(--line); border-radius:999px;
    padding:6px 16px; font-size:14px; font-variant-numeric:tabular-nums}
  .pill b{color:var(--gold)}
  #timer.warn b{color:var(--bad)}
  main{max-width:780px; margin:24px auto; padding:0 16px}
  .q{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:18px 20px; margin-bottom:16px; transition:.2s;
  }
  .q .qnum{color:var(--brand); font-weight:700; font-size:13px; margin-bottom:6px}
  .q .qtext{font-size:17px; font-weight:600; margin-bottom:14px}
  .opt{
    display:flex; align-items:flex-start; gap:10px; padding:11px 14px;
    border:1px solid var(--line); border-radius:10px; margin-bottom:8px;
    cursor:pointer; background:var(--card2); transition:.15s; font-size:15px;
  }
  .opt:hover{border-color:var(--brand)}
  .opt input{margin-top:5px; accent-color:var(--brand); flex:none}
  .opt .letter{font-weight:700; color:var(--muted); flex:none}
  .opt.sel{border-color:var(--brand); background:#1d2c47}
  .opt.correct{border-color:var(--ok); background:var(--okbg)}
  .opt.wrong{border-color:var(--bad); background:var(--badbg)}
  .explain{
    margin-top:10px; padding:10px 14px; border-inline-start:3px solid var(--gold);
    background:#241f12; border-radius:8px; font-size:14px; color:#ecdca6;
    display:none;
  }
  .explain.show{display:block}
  .actions{text-align:center; margin:30px 0}
  button.act{
    font-family:inherit; font-size:16px; font-weight:700; cursor:pointer;
    border:none; border-radius:10px; padding:13px 32px; transition:.15s;
  }
  .btn-primary{background:var(--brand); color:#fff}
  .btn-primary:hover{background:var(--brand2)}
  .btn-ghost{background:transparent; color:var(--muted); border:1px solid var(--line); margin-inline-start:10px}
  #result{
    display:none; text-align:center; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:28px; margin:24px auto; max-width:780px;
  }
  #result.show{display:block}
  #result .score{font-size:46px; font-weight:800; margin:6px 0}
  #result .verdict{font-size:22px; font-weight:700}
  #result .pass{color:var(--ok)} #result .fail{color:var(--bad)}
  #result .sub{color:var(--muted); font-size:14px; margin-top:8px}
  .ring{
    --p:0; width:120px; height:120px; border-radius:50%; margin:0 auto 8px;
    background:conic-gradient(var(--c) calc(var(--p)*1%), var(--line) 0);
    display:grid; place-items:center;
  }
  .ring::before{content:""; width:96px; height:96px; border-radius:50%; background:var(--card)}
  .ring span{position:absolute; font-size:26px; font-weight:800}
  .ringwrap{position:relative; display:grid; place-items:center}
  footer{text-align:center; color:var(--muted); font-size:12px; padding:20px}
  a{color:var(--brand)}
</style>
</head>
<body>
<header>
  <button class="langbtn" id="langbtn"></button>
  <h1 id="title"></h1>
  <p id="subtitle"></p>
  <div class="tests" id="tests"></div>
  <div class="bar">
    <span class="pill" id="pill-count"></span>
    <span class="pill" id="pill-pass"></span>
    <span class="pill" id="timer">⏱ <b>90:00</b></span>
    <span class="pill" id="progress"></span>
  </div>
</header>

<main>
  <div id="quiz"></div>
  <div class="actions">
    <button class="act btn-primary" id="submit"></button>
    <button class="act btn-ghost" id="reset"></button>
  </div>
</main>

<div id="result">
  <div class="ringwrap"><div class="ring" id="ring"><span id="ringtxt">0</span></div></div>
  <div class="score" id="scoreNum">0/25</div>
  <div class="verdict" id="verdict"></div>
  <div class="sub" id="sub"></div>
  <div class="actions">
    <button class="act btn-primary" id="reset2"></button>
  </div>
</div>

<footer id="footer"></footer>

let testIndex = 0;
let Q = TESTS[testIndex].Q;

let lang = 'he';
let answers = new Array(Q.length).fill(null);
let checked = false;
let lastScore = 0;
const passMark = () => Math.ceil(Q.length * 0.6);

const quiz = document.getElementById('quiz');

function render(){
  const t = UI[lang];
  quiz.innerHTML = '';
  Q.forEach((item,i)=>{
    const d = item[lang];
    const card = document.createElement('div');
    card.className='q'; card.id='q'+i;
    let html = `<div class="qnum">${t.qword} ${i+1}</div><div class="qtext">${d.q}</div>`;
    d.o.forEach((opt,j)=>{
      html += `<label class="opt" data-q="${i}" data-o="${j}">
        <input type="radio" name="q${i}" value="${j}" ${answers[i]===j?'checked':''}>
        <span class="letter">${t.letters[j]}.</span><span>${opt}</span></label>`;
    });
    html += `<div class="explain" id="e${i}">💡 ${d.e}</div>`;
    card.innerHTML = html;
    quiz.appendChild(card);
  });
  // re-bind clicks
  document.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{
      if(checked) return;
      const qi=+el.dataset.q, oi=+el.dataset.o;
      answers[qi]=oi;
      document.querySelectorAll(`[data-q="${qi}"]`).forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      updateProgress();
    });
  });
  // restore sel state
  answers.forEach((ans,i)=>{
    if(ans!==null){
      const el=document.querySelector(`[data-q="${i}"][data-o="${ans}"]`);
      if(el) el.classList.add('sel');
    }
  });
  // if already checked, re-apply graded view
  if(checked) applyGraded();
  updateProgress();
}

function applyGraded(){
  Q.forEach((item,i)=>{
    document.getElementById('e'+i).classList.add('show');
    document.querySelectorAll(`[data-q="${i}"]`).forEach(el=>{
      const oi=+el.dataset.o;
      el.style.pointerEvents='none';
      el.classList.remove('sel');
      if(oi===item.a) el.classList.add('correct');
      else if(answers[i]===oi) el.classList.add('wrong');
    });
  });
}

function updateProgress(){
  const n = answers.filter(a=>a!==null).length;
  document.getElementById('progress').innerHTML = `${UI[lang].answered} <b>${n}</b>/${Q.length}`;
}

function check(){
  checked = true;
  let score=0;
  Q.forEach((item,i)=>{ if(answers[i]===item.a) score++; });
  lastScore = score;
  applyGraded();
  showResult();
}

function showResult(){
  stopTimer();
  const t = UI[lang];
  const score = lastScore;
  const pct = Math.round(score/Q.length*100);
  const pass = score>=passMark();
  const res = document.getElementById('result');
  res.classList.add('show');
  document.getElementById('scoreNum').textContent = score+'/'+Q.length;
  const v = document.getElementById('verdict');
  v.textContent = pass ? t.passV : t.failV;
  v.className = 'verdict '+(pass?'pass':'fail');
  document.getElementById('sub').textContent = pass ? t.subPass(pct) : t.subFail(pct, passMark());
  const ring = document.getElementById('ring');
  ring.style.setProperty('--p', pct);
  ring.style.setProperty('--c', pass?'#2ecc71':'#ff5d5d');
  document.getElementById('ringtxt').textContent = pct;
}

// timer
let secs = 90*60, timerId=null;
function tick(){
  secs--;
  const m=String(Math.floor(secs/60)).padStart(2,'0');
  const s=String(secs%60).padStart(2,'0');
  document.querySelector('#timer b').textContent = `${m}:${s}`;
  if(secs<=300) document.getElementById('timer').classList.add('warn');
  if(secs<=0){ stopTimer(); check(); }
}
function startTimer(){ timerId=setInterval(tick,1000); }
function stopTimer(){ if(timerId){clearInterval(timerId); timerId=null;} }

function applyLang(newLang){
  lang = newLang;
  const t = UI[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = t.dir;
  document.getElementById('title').textContent = t.title;
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('pill-count').textContent = t.count(Q.length);
  document.getElementById('pill-pass').innerHTML = t.pass(passMark(), Q.length);
  document.getElementById('submit').textContent = t.submit;
  document.getElementById('reset').textContent = t.reset;
  document.getElementById('reset2').textContent = t.reset2;
  document.getElementById('footer').innerHTML = t.footer;
  document.getElementById('langbtn').textContent = '🌐 ' + UI[lang==='he'?'ru':'he'].langName;
  renderTests();
  render();
  if(checked) showResult();
}

function renderTests(){
  const wrap = document.getElementById('tests');
  wrap.innerHTML = '';
  TESTS.forEach((tst,i)=>{
    const b = document.createElement('button');
    b.className = 'testbtn' + (i===testIndex ? ' active' : '');
    b.textContent = tst.name[lang];
    b.addEventListener('click', ()=>{ if(i!==testIndex) switchTest(i); });
    wrap.appendChild(b);
  });
}

function switchTest(i){
  testIndex = i;
  Q = TESTS[i].Q;
  answers = new Array(Q.length).fill(null);
  checked = false; lastScore = 0; secs = 90*60;
  document.getElementById('timer').classList.remove('warn');
  document.querySelector('#timer b').textContent = '90:00';
  document.getElementById('result').classList.remove('show');
  applyLang(lang);
  stopTimer(); startTimer();
  window.scrollTo({top:0,behavior:'smooth'});
}

function reset(){
  answers = new Array(Q.length).fill(null);
  checked=false; lastScore=0; secs=90*60;
  document.getElementById('timer').classList.remove('warn');
  document.querySelector('#timer b').textContent='90:00';
  document.getElementById('result').classList.remove('show');
  render(); stopTimer(); startTimer();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('langbtn').addEventListener('click',()=>{
  applyLang(lang==='he' ? 'ru' : 'he');
});
document.getElementById('submit').addEventListener('click',()=>{
  check();
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
});
document.getElementById('reset').addEventListener('click',reset);
document.getElementById('reset2').addEventListener('click',reset);

applyLang('he');
startTimer();
</script>

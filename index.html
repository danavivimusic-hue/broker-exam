<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבחן תיווך מקרקעין — מועד דמה</title>
<style>
  :root{
    --bg:#0f1419; --card:#1a2230; --card2:#222c3d; --line:#33415c;
    --txt:#e8edf4; --muted:#9aa7bd; --brand:#4f8cff; --brand2:#3a6fd8;
    --ok:#2ecc71; --okbg:#143324; --bad:#ff5d5d; --badbg:#3a1b1f; --gold:#f5c451;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:"Heebo","Assistant","Arial Hebrew",system-ui,Arial,sans-serif;
    line-height:1.6; padding:0 0 80px;
  }
  header{
    background:linear-gradient(135deg,#1c2940,#0f1419);
    border-bottom:1px solid var(--line); padding:28px 20px; text-align:center;
    position:sticky; top:0; z-index:50; backdrop-filter:blur(6px);
  }
  header h1{margin:0 0 6px; font-size:24px; letter-spacing:-.02em}
  header p{margin:0; color:var(--muted); font-size:14px}
  .bar{
    display:flex; gap:16px; justify-content:center; align-items:center;
    margin-top:14px; flex-wrap:wrap;
  }
  .pill{background:var(--card2); border:1px solid var(--line); border-radius:999px;
    padding:6px 16px; font-size:14px; font-variant-numeric:tabular-nums}
  .pill b{color:var(--gold)}
  #timer.warn b{color:var(--bad)}
  main{max-width:780px; margin:24px auto; padding:0 16px}
  .q{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:18px 20px; margin-bottom:16px; transition:.2s;
  }
  .q .qnum{color:var(--brand); font-weight:700; font-size:13px; margin-bottom:6px}
  .q .qtext{font-size:17px; font-weight:600; margin-bottom:14px}
  .opt{
    display:flex; align-items:flex-start; gap:10px; padding:11px 14px;
    border:1px solid var(--line); border-radius:10px; margin-bottom:8px;
    cursor:pointer; background:var(--card2); transition:.15s; font-size:15px;
  }
  .opt:hover{border-color:var(--brand)}
  .opt input{margin-top:5px; accent-color:var(--brand); flex:none}
  .opt .letter{font-weight:700; color:var(--muted); flex:none}
  .opt.sel{border-color:var(--brand); background:#1d2c47}
  .opt.correct{border-color:var(--ok); background:var(--okbg)}
  .opt.wrong{border-color:var(--bad); background:var(--badbg)}
  .explain{
    margin-top:10px; padding:10px 14px; border-right:3px solid var(--gold);
    background:#241f12; border-radius:8px; font-size:14px; color:#ecdca6;
    display:none;
  }
  .explain.show{display:block}
  .actions{text-align:center; margin:30px 0}
  button{
    font-family:inherit; font-size:16px; font-weight:700; cursor:pointer;
    border:none; border-radius:10px; padding:13px 32px; transition:.15s;
  }
  .btn-primary{background:var(--brand); color:#fff}
  .btn-primary:hover{background:var(--brand2)}
  .btn-ghost{background:transparent; color:var(--muted); border:1px solid var(--line); margin-right:10px}
  #result{
    display:none; text-align:center; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:28px; margin:24px auto; max-width:780px;
  }
  #result.show{display:block}
  #result .score{font-size:46px; font-weight:800; margin:6px 0}
  #result .verdict{font-size:22px; font-weight:700}
  #result .pass{color:var(--ok)} #result .fail{color:var(--bad)}
  #result .sub{color:var(--muted); font-size:14px; margin-top:8px}
  .ring{
    --p:0; width:120px; height:120px; border-radius:50%; margin:0 auto 8px;
    background:conic-gradient(var(--c) calc(var(--p)*1%), var(--line) 0);
    display:grid; place-items:center;
  }
  .ring::before{content:""; width:96px; height:96px; border-radius:50%; background:var(--card)}
  .ring span{position:absolute; font-size:26px; font-weight:800}
  .ringwrap{position:relative; display:grid; place-items:center}
  footer{text-align:center; color:var(--muted); font-size:12px; padding:20px}
  a{color:var(--brand)}
</style>
</head>
<body>
<header>
  <h1>📋 מבחן רישוי מתווכים במקרקעין</h1>
  <p>מועד דמה · פורמט בחינת רשם המתווכים</p>
  <div class="bar">
    <span class="pill">25 שאלות</span>
    <span class="pill">ציון עובר: <b>15/25</b></span>
    <span class="pill" id="timer">⏱ <b>90:00</b></span>
    <span class="pill" id="progress">נענו: <b>0</b>/25</span>
  </div>
</header>

<main>
  <div id="quiz"></div>
  <div class="actions">
    <button class="btn-primary" id="submit">בדוק מבחן ✓</button>
    <button class="btn-ghost" id="reset">התחל מחדש</button>
  </div>
</main>

<div id="result">
  <div class="ringwrap"><div class="ring" id="ring"><span id="ringtxt">0</span></div></div>
  <div class="score" id="scoreNum">0/25</div>
  <div class="verdict" id="verdict"></div>
  <div class="sub" id="sub"></div>
  <div class="actions">
    <button class="btn-primary" id="reset2">מבחן חדש / נסה שוב</button>
  </div>
</div>

<footer>
  הסבר מלא מופיע מתחת לכל שאלה לאחר הבדיקה · נושאים לפי תקנות המתווכים במקרקעין (נושאי בחינה), תשנ"ז-1997<br>
  מבחן תרגול בלבד — אינו תחליף לחומר הרשמי של משרד המשפטים
</footer>

<script>
const Q = [
 {q:'"תיווך במקרקעין" לפי חוק המתווכים במקרקעין מוגדר כ:',
  o:['כל פעולת שיווק של נכס בתמורה','הפגשה בתמורה בין שניים או יותר לשם התקשרותם בעסקה בזכות במקרקעין','מתן ייעוץ משפטי בעסקת מקרקעין תמורת שכר','רישום עסקה בלשכת רישום המקרקעין'],
  a:1, e:'הגדרת "תיווך במקרקעין" בס\'1 — הפגשה בתמורה לשם התקשרות בעסקה.'},
 {q:'איזה מהבאים הוא תנאי לקבלת רישיון תיווך?',
  o:['גיל 21 לפחות','תואר אקדמי במשפטים','היעדר הרשעה בעבירה שיש עמה קלון בחמש השנים שקדמו לבקשה','אזרחות ישראלית בלבד — תושב קבע אינו זכאי'],
  a:2, e:'ס\'5: גיל 18, אזרח/תושב/זכאי לעבוד, לא פושט רגל, ללא הרשעה בקלון 5 שנים.'},
 {q:'מתווך הפגיש בעל-פה בין מוכר לקונה, ללא חתימה על הזמנה בכתב, והעסקה נחתמה. האם זכאי לדמי תיווך?',
  o:['כן, אם היה הגורם היעיל','כן, ובלבד שהלקוח אישר בעל-פה','לא — היעדר הזמנה בכתב חתומה שולל את הזכאות','כן, אך רק למחצית מדמי התיווך'],
  a:2, e:'ס\'9 — הזמנה בכתב חתומה היא תנאי סף; בלעדיה אין זכאות, גם אם היה הגורם היעיל.'},
 {q:'איזה פרט אינו מבין הפרטים שחובה לכלול בהזמנה בכתב לפי התקנות?',
  o:['סכום דמי התיווך או שיעורם','תיאור הנכס שלגביו מתבצע התיווך','מספר חשבון הבנק של הלקוח','סוג העסקה שאליה מתייחס התיווך'],
  a:2, e:'חשבון בנק אינו פרט חובה. חובה: זיהוי הצדדים, סוג העסקה, תיאור הנכס, מחיר, דמי תיווך.'},
 {q:'מתווך קיבל בלעדיות בכתב למכירת דירת מגורים, אך לא נקבעה תקופת הבלעדיות. מהי תקופתה?',
  o:['30 יום מיום חתימת ההזמנה','6 חודשים','הבלעדיות בטלה מעיקרה','שנה אחת'],
  a:0, e:'בלעדיות בדירת מגורים ללא תקופה שנקבעה — 30 יום.'},
 {q:'מהי תקופת הבלעדיות המרבית שניתן לקבוע בדירת מגורים?',
  o:['3 חודשים','6 חודשים','שנה','אין הגבלה'],
  a:1, e:'מקסימום בלעדיות בדירת מגורים — 6 חודשים.'},
 {q:'מתווך קיבל בלעדיות ל-90 יום אך לא ביצע ולו פעולת שיווק אחת. מתי תפקע הבלעדיות?',
  o:['לאחר 90 יום','לאחר 45 יום','בתום שליש מהתקופה — 30 יום','הבלעדיות אינה פוקעת אוטומטית'],
  a:2, e:'לא בוצעו פעולות שיווק עד תום שליש מהתקופה → הבלעדיות פוקעת. שליש מ-90 = 30 יום.'},
 {q:'מתווך מעוניין לרכוש בעצמו נכס שהוא משווק עבור מוכר. כיצד עליו לפעול?',
  o:['אסור לו בהחלט לרכוש נכס שהוא משווק','עליו לגלות ללקוח את עניינו האישי ולקבל את הסכמתו בכתב','די בכך שיודיע על כך בעל-פה','מותר לו, ובלבד שישלם לעצמו את מלוא דמי התיווך'],
  a:1, e:'ס\'10 — עניין אישי מחייב גילוי + הסכמת הלקוח בכתב.'},
 {q:'לפי חוק המתווכים, מתווך במקרקעין:',
  o:['רשאי לערוך הסכם מכר מחייב עבור הצדדים','רשאי לייצג את הצדדים בעסקה המשפטית','אינו רשאי לערוך מסמכים בעלי אופי משפטי הנוגעים לעסקה','חייב לערוך זיכרון דברים בכתב'],
  a:2, e:'המתווך אינו רשאי לערוך מסמכים בעלי אופי משפטי או לייצג בעסקה.'},
 {q:'מהם התנאים המצטברים לזכאות מתווך לדמי תיווך?',
  o:['רישיון בתוקף, הזמנה בכתב, והיותו הגורם היעיל','רישיון בתוקף בלבד','הסכמה בעל-פה והיותו הגורם היעיל','ביצוע 2 פעולות שיווק וחתימת זיכרון דברים'],
  a:0, e:'ס\'14(א) — שלושה תנאים מצטברים: רישיון בתוקף, הזמנה בכתב, גורם יעיל.'},
 {q:'לפי חוק המקרקעין, התחייבות לעשות עסקה במקרקעין:',
  o:['תקפה גם בעל-פה אם יש עדים','טעונה מסמך בכתב','טעונה רישום מיידי בטאבו','טעונה אישור בית משפט'],
  a:1, e:'חוק המקרקעין ס\'8 — דרישת הכתב: התחייבות לעסקה טעונה מסמך בכתב.'},
 {q:'מתי נגמרת עסקה המקנה בעלות במקרקעין לפי חוק המקרקעין?',
  o:['עם חתימת חוזה המכר','עם תשלום מלוא התמורה','עם רישום העסקה בלשכת רישום המקרקעין','עם מסירת החזקה בנכס'],
  a:2, e:'חוק המקרקעין ס\'7 — עסקה נגמרת ברישום; עד אז יש התחייבות בלבד.'},
 {q:'מהי מטרת הערת אזהרה הנרשמת בלשכת רישום המקרקעין?',
  o:['להעביר את הבעלות לקונה','ליידע ולהזהיר צדדים שלישיים בדבר התחייבות לעשות עסקה בנכס','לפטור מתשלום מס רכישה','לשמש תחליף לרישום בטאבו'],
  a:1, e:'הערת אזהרה מזהירה צד ג\' מפני התחייבות קודמת; אינה מעבירה בעלות.'},
 {q:'מתי ייחשב זיכרון דברים בעסקת מקרקעין לחוזה מחייב?',
  o:['לעולם לא — זהו מסמך בלתי מחייב','רק לאחר אישור עו"ד','כאשר מתקיימים בו יסודות גמירת הדעת והמסוימות','רק אם נרשם בטאבו'],
  a:2, e:'זיכרון דברים מחייב כשמתקיימים גמירת דעת + מסוימות.'},
 {q:'צד שנכרת עמו חוזה עקב הטעיה רשאי:',
  o:['רק לתבוע פיצויים','לבטל את החוזה','לאכוף את החוזה בכפייה','אין לו כל סעד'],
  a:1, e:'פגם בכריתה (הטעיה) מקנה זכות ביטול החוזה.'},
 {q:'איזו מהבאות אינה תרופה בשל הפרת חוזה?',
  o:['אכיפה','פיצויים','ביטול והשבה','מאסר המפר'],
  a:3, e:'תרופות: אכיפה, ביטול והשבה, פיצויים. מאסר אינו תרופה אזרחית.'},
 {q:'מס רכישה בעסקת מקרקעין חל בדרך כלל על:',
  o:['המוכר','הקונה','המתווך','שני הצדדים בחלקים שווים'],
  a:1, e:'מס רכישה — על הקונה.'},
 {q:'מס שבח מקרקעין מוטל על:',
  o:['הרווח (השבח) שנצמח למוכר ממכירת הזכות','הקונה בעת הרכישה','שווי הנכס המלא','דמי התיווך'],
  a:0, e:'מס שבח — על השבח (הרווח) של המוכר.'},
 {q:'לעניין מס רכישה, רוכש "דירה יחידה" לעומת רוכש דירה נוספת:',
  o:['משלם מדרגות מס מופחתות / פטור עד תקרה','משלם מס גבוה יותר','פטור מוחלט ללא תקרה','אין הבדל בין השניים'],
  a:0, e:'דירה יחידה — מדרגות מופחתות/פטור עד תקרה; דירה נוספת — מס גבוה יותר.'},
 {q:'לפי חוק המכר (הבטחת השקעות של רוכשי דירות), קבלן המקבל כספים מרוכש חייב:',
  o:['להעמיד בטוחה כגון ערבות בנקאית או ביטוח','לרשום מיד את הדירה ע"ש הרוכש','להחזיק את הכספים בנאמנות אצל המתווך','אין עליו חובה כלשהי עד מסירת הדירה'],
  a:0, e:'חוק המכר (הבטחת השקעות) — חובת בטוחה (ערבות בנקאית/ביטוח/הערה/שעבוד/פיקדון).'},
 {q:'לפי חוק המכר (דירות), המוכר (קבלן) חייב לצרף לחוזה:',
  o:['מפרט של הדירה','דו"ח שמאי','אישור זכויות מהטאבו בלבד','הערכת מתווך'],
  a:0, e:'חוק המכר (דירות) — חובת צירוף מפרט + אחריות לאי-התאמה.'},
 {q:'"דייר מוגן" לפי חוק הגנת הדייר הוא בדרך כלל:',
  o:['שוכר רגיל בשכירות חופשית','דייר ששילם דמי מפתח / שכירות לפי החוק ונהנה מהגנה מפני פינוי','כל שוכר דירת מגורים בישראל','בעל הנכס עצמו'],
  a:1, e:'דייר מוגן — מי ששילם דמי מפתח/שכירות לפי החוק ומוגן מפני פינוי.'},
 {q:'איזו מהבאות אינה צורת צוואה מוכרת בחוק הירושה?',
  o:['צוואה בכתב יד','צוואה בעדים','צוואה בפני רשות','צוואה המוקלטת בווידאו בלבד'],
  a:3, e:'צורות צוואה: בכתב יד, בעדים, בפני רשות, בעל-פה (שכיב מרע). וידאו בלבד — לא.'},
 {q:'מי מוסמך בדרך כלל להוציא היתר בנייה?',
  o:['הוועדה המקומית לתכנון ובנייה','לשכת רישום המקרקעין','רשם המתווכים','רשות המסים'],
  a:0, e:'היתר בנייה — מהוועדה המקומית לתכנון ובנייה.'},
 {q:'לפי תקנות המתווכים (אתיקה וחובות מקצועיות), התשפ"ד-2024, על המתווך:',
  o:['לפעול בהגינות, לגלות מידע מהותי ולהימנע מהטעיה','להעדיף תמיד את האינטרס של המוכר','לגבות דמי תיווך משני הצדדים תמיד','להימנע מכל פרסום של נכסים'],
  a:0, e:'חובות אתיקה תשפ"ד-2024 — הגינות, גילוי מידע מהותי, איסור הטעיה.'},
];

const LET = ['א','ב','ג','ד'];
let answers = new Array(Q.length).fill(null);
let checked = false;

const quiz = document.getElementById('quiz');
function render(){
  quiz.innerHTML = '';
  Q.forEach((item,i)=>{
    const card = document.createElement('div');
    card.className='q'; card.id='q'+i;
    let html = `<div class="qnum">שאלה ${i+1}</div><div class="qtext">${item.q}</div>`;
    item.o.forEach((opt,j)=>{
      html += `<label class="opt" data-q="${i}" data-o="${j}">
        <input type="radio" name="q${i}" value="${j}" ${answers[i]===j?'checked':''}>
        <span class="letter">${LET[j]}.</span><span>${opt}</span></label>`;
    });
    html += `<div class="explain" id="e${i}">💡 ${item.e}</div>`;
    card.innerHTML = html;
    quiz.appendChild(card);
  });
  document.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{
      if(checked) return;
      const qi=+el.dataset.q, oi=+el.dataset.o;
      answers[qi]=oi;
      document.querySelectorAll(`[data-q="${qi}"]`).forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      updateProgress();
    });
  });
  updateProgress();
}
function updateProgress(){
  const n = answers.filter(a=>a!==null).length;
  document.querySelector('#progress b').textContent = n;
}

function check(){
  checked = true;
  let score=0;
  Q.forEach((item,i)=>{
    document.getElementById('e'+i).classList.add('show');
    document.querySelectorAll(`[data-q="${i}"]`).forEach(el=>{
      const oi=+el.dataset.o;
      el.style.pointerEvents='none';
      if(oi===item.a) el.classList.add('correct');
      else if(answers[i]===oi) el.classList.add('wrong');
    });
    if(answers[i]===item.a) score++;
  });
  showResult(score);
}

function showResult(score){
  stopTimer();
  const pct = Math.round(score/Q.length*100);
  const pass = score>=15;
  const res = document.getElementById('result');
  res.classList.add('show');
  document.getElementById('scoreNum').textContent = score+'/25';
  const v = document.getElementById('verdict');
  v.textContent = pass ? '🎉 עברת!' : '😕 לא עברת';
  v.className = 'verdict '+(pass?'pass':'fail');
  document.getElementById('sub').textContent = pass
    ? `ציון ${pct}. כל הכבוד — מעל סף ה-60.`
    : `ציון ${pct}. נדרשות 15 תשובות נכונות (60). גלול למעלה לראות הסברים.`;
  const ring = document.getElementById('ring');
  ring.style.setProperty('--p', pct);
  ring.style.setProperty('--c', pass?'#2ecc71':'#ff5d5d');
  document.getElementById('ringtxt').textContent = pct;
  res.scrollIntoView({behavior:'smooth'});
}

// timer
let secs = 90*60, timerId=null;
function tick(){
  secs--;
  const m=String(Math.floor(secs/60)).padStart(2,'0');
  const s=String(secs%60).padStart(2,'0');
  document.querySelector('#timer b').textContent = `${m}:${s}`;
  if(secs<=300) document.getElementById('timer').classList.add('warn');
  if(secs<=0){ stopTimer(); check(); }
}
function startTimer(){ timerId=setInterval(tick,1000); }
function stopTimer(){ if(timerId){clearInterval(timerId); timerId=null;} }

function reset(){
  answers = new Array(Q.length).fill(null);
  checked=false; secs=90*60;
  document.getElementById('timer').classList.remove('warn');
  document.querySelector('#timer b').textContent='90:00';
  document.getElementById('result').classList.remove('show');
  render(); stopTimer(); startTimer();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('submit').addEventListener('click',check);
document.getElementById('reset').addEventListener('click',reset);
document.getElementById('reset2').addEventListener('click',reset);

render();
startTimer();
</script>
